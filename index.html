<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f75f3b" />
    <meta
      name="description"
      content="FlashMeals serves quick five-minute meal ideas as collectible 3D recipe flash cards."
    />
    <link rel="stylesheet" href="./assets/index.css" data-production-style />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <title>FlashMeals</title>
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="topbar" aria-label="App controls">
        <div>
          <p class="kicker">5 minute meal cards</p>
          <h1 id="app-title">FlashMeals</h1>
        </div>
        <div class="top-actions">
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
            <span class="theme-glyph" id="themeGlyph" aria-hidden="true">☾</span>
          </button>
          <button class="icon-button" id="savedButton" type="button" aria-label="Open saved recipes">
            <span aria-hidden="true">Saved</span>
            <span id="savedCount">0</span>
          </button>
          <a class="donate-link" id="donateLink" href="https://ko-fi.com/" target="_blank" rel="noreferrer">
            Ko-fi
          </a>
        </div>
      </section>

      <section class="stage" aria-label="Meal flash card">
        <div class="meal-panel" aria-live="polite">
          <p class="kicker">Now dealing</p>
          <h2 id="mealName">Loading meal</h2>
          <div class="meal-meta">
            <span id="mealTime">5 min</span>
            <span id="mealTags">quick</span>
          </div>
          <div class="category-filter" id="categoryFilter" aria-label="Meal categories">
            <button class="category-button is-active" type="button" data-category="all" aria-pressed="true">All</button>
            <button class="category-button" type="button" data-category="breakfast" aria-pressed="false">Breakfast</button>
            <button class="category-button" type="button" data-category="lunch" aria-pressed="false">Lunch</button>
            <button class="category-button" type="button" data-category="dinner" aria-pressed="false">Dinner</button>
          </div>
          <div class="thumbnail-rail" id="thumbnailRail" aria-label="Meal photo thumbnails"></div>
        </div>

        <div class="card-scene">
          <canvas id="cardCanvas" data-testid="card-canvas" aria-label="3D FlashMeals recipe card"></canvas>
        </div>

        <div class="card-status" aria-live="polite">
          <span id="cardSide">Photo side</span>
          <span id="cardSignal">Card ready</span>
        </div>
      </section>

      <section class="controls" aria-label="Recipe controls">
        <button class="primary-action" id="nextButton" type="button">Next Meal</button>
        <button class="save-action" id="saveButton" type="button">Save Card</button>
      </section>
    </main>

    <aside class="collection" id="collectionDrawer" aria-hidden="true" aria-label="Saved recipes">
      <div class="collection-panel">
        <div class="collection-header">
          <div>
            <p class="kicker">Your collection</p>
            <h2>Saved Meals</h2>
          </div>
          <button class="icon-button" id="closeDrawerButton" type="button" aria-label="Close saved recipes">
            Close
          </button>
        </div>
        <div class="saved-list" id="savedList"></div>
      </div>
    </aside>

    <section class="install-prompt" id="installPrompt" aria-hidden="true" aria-label="Install FlashMeals">
      <div class="install-panel">
        <div>
          <p class="kicker">Install app</p>
          <h2>Keep FlashMeals on your device</h2>
          <p>Open quick meal cards from your home screen and keep the app ready for offline cooking ideas.</p>
        </div>
        <div class="install-actions">
          <button class="primary-action" id="installButton" type="button">Install</button>
          <button class="icon-button" id="dismissInstallButton" type="button">Later</button>
        </div>
      </div>
    </section>

    <script>
      window.__FLASHMEALS_LOCAL_DEV__ = ["127.0.0.1", "localhost", "::1"].includes(window.location.hostname);
      if (window.__FLASHMEALS_LOCAL_DEV__) {
        document.querySelector("[data-production-style]")?.remove();
      } else if (!document.querySelector('script[src="./assets/index.js"]')) {
        const productionScript = document.createElement("script");
        productionScript.type = "module";
        productionScript.src = "./assets/index.js";
        document.head.appendChild(productionScript);
      }
    </script>
    <script type="module" src="/src/main.ts" data-source-entry></script>
    <script>
      if (!window.__FLASHMEALS_LOCAL_DEV__) {
        document.querySelector("[data-source-entry]")?.remove();
      }
    </script>
  </body>
</html>
